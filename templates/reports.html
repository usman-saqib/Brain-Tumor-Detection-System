<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports — NeuraScan AI</title>
    
    <!-- Global Styles -->
    <link href="/static/css/global.css" rel="stylesheet">
    <script src="/static/js/global.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cyan: #00E5FF;
            --cyan-dim: #00B8CC;
            --cyan-glow: rgba(0,229,255,0.12);
            --bg: #020810;
            --bg2: #060d1a;
            --bg3: #0d1f35;
            --text: #e8f4f8;
            --muted: #607d8b;
            --border: rgba(0,229,255,0.1);
            --red: #FF4560;
            --green: #00E396;
            --purple: #7C5CBF;
            --yellow: #FFB800;
            --card-bg: rgba(6,13,26,0.8);
        }
        
        body.light-mode {
            --bg: #f0f4f8;
            --bg2: #ffffff;
            --bg3: #e2e8f0;
            --text: #1a202c;
            --muted: #718096;
            --border: rgba(0,0,0,0.1);
            --card-bg: rgba(255,255,255,0.9);
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(0,229,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.022) 1px, transparent 1px); background-size: 70px 70px; }
        .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(90px); }
        .orb1 { width: 500px; height: 500px; background: rgba(0,229,255,0.04); top: -150px; left: -100px; }
        .orb2 { width: 420px; height: 420px; background: rgba(124,92,191,0.04); bottom: -80px; right: -80px; }
        
        .dashboard { display: flex; min-height: 100vh; position: relative; z-index: 1; }
        
        .sidebar {
            width: 280px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .logo-mark {
            width: 40px;
            height: 40px;
            border: 1.5px solid var(--cyan);
            border-radius: 10px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-mark::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid var(--cyan);
        }
        
        .logo-mark::after {
            content: '';
            position: absolute;
            width: 7px;
            height: 7px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyan);
        }
        
        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
        }
        
        .logo-text em { color: var(--cyan); font-style: normal; }
        
        .user-profile {
            text-align: center;
            padding: 1.5rem 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            font-weight: bold;
            border: 2px solid var(--cyan);
        }
        
        .user-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .user-email { font-size: 0.75rem; color: var(--muted); }
        
        .nav-menu { list-style: none; padding: 0; margin: 0; }
        .nav-item { margin-bottom: 0.5rem; }
        
        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            color: var(--muted);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .nav-link-custom i { width: 22px; font-size: 1.1rem; }
        .nav-link-custom:hover { background: var(--cyan-glow); color: var(--cyan); }
        .nav-link-custom.active { background: var(--cyan-glow); color: var(--cyan); border-left: 3px solid var(--cyan); }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .clock-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 0.8rem 1.5rem;
            text-align: center;
        }
        
        .digital-clock { font-family: monospace; font-size: 1.3rem; font-weight: 700; color: var(--cyan); }
        .clock-date { font-size: 0.7rem; color: var(--muted); }
        
        .reports-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .report-item {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .report-item:hover {
            border-color: var(--cyan);
            transform: translateX(5px);
        }
        
        .report-info { flex: 1; }
        .report-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .report-meta { font-size: 0.75rem; color: var(--muted); }
        
        .report-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        .badge-glioma { background: rgba(255,152,0,0.2); color: #ff9800; }
        .badge-meningioma { background: rgba(33,150,243,0.2); color: #2196f3; }
        .badge-pituitary { background: rgba(156,39,176,0.2); color: #9c27b0; }
        .badge-no-tumor { background: rgba(76,175,80,0.2); color: #4caf50; }
        
        .btn-download {
            background: var(--cyan);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            color: var(--bg);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--cyan);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
        }
        
        .empty-icon {
            font-size: 4rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        
        .toast-success { background: var(--green); }
        .toast-error { background: var(--red); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in { animation: fadeIn 0.5s ease; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 1000; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .report-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="dashboard">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-mark"></div>
            <div class="logo-text">Neura<em>Scan</em></div>
        </div>
        
        <div class="user-profile">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-name" id="userName"></div>
            <div class="user-email" id="userEmail"></div>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard" class="nav-link-custom"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="nav-item"><a href="/detection" class="nav-link-custom"><i class="fas fa-microscope"></i> Detection</a></li>
            <li class="nav-item"><a href="/history" class="nav-link-custom"><i class="fas fa-history"></i> History</a></li>
            <li class="nav-item"><a href="/profile" class="nav-link-custom"><i class="fas fa-user"></i> Profile</a></li>
            <li class="nav-item"><a href="/reports" class="nav-link-custom active"><i class="fas fa-file-alt"></i> Reports</a></li>
            <li class="nav-item"><a href="/analytics" class="nav-link-custom"><i class="fas fa-chart-line"></i> Analytics</a></li>
            <li class="nav-item"><a href="/logout" class="nav-link-custom"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>
    
    <main class="main-content fade-in">
        <div class="header">
            <h1 class="page-title">Clinical Reports</h1>
            <div class="clock-box">
                <div class="digital-clock" id="digitalClock">--:--:--</div>
                <div class="clock-date" id="clockDate">--/--/----</div>
            </div>
        </div>
        
        <div class="reports-card">
            <h5><i class="fas fa-history"></i> Saved Reports</h5>
            <p class="text-muted mb-3">Your previously generated clinical reports</p>
            <div id="reportsList"></div>
        </div>
    </main>
</div>

<div class="loader-overlay" id="loaderOverlay">
    <div class="text-center">
        <i class="fas fa-brain fa-5x" style="color: var(--cyan); animation: pulse 1.5s infinite;"></i>
        <h3 class="mt-3">Generating Report...</h3>
        <p>Please wait while we prepare your clinical report</p>
        <div class="spinner-border mt-3" role="status"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadUserData();
        loadSavedReports();
        startDigitalClock();
    });
    
    function startDigitalClock() {
        updateClock();
        setInterval(updateClock, 1000);
    }
    
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('digitalClock').innerText = `${hours}:${minutes}:${seconds}`;
        
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        document.getElementById('clockDate').innerText = `${day}/${month}/${year}`;
    }
    
    function loadUserData() {
        fetch('/api/current-user')
            .then(res => res.json())
            .then(data => {
                if (data.success && data.user) {
                    document.getElementById('userName').innerText = `${data.user.first_name} ${data.user.last_name}`;
                    document.getElementById('userEmail').innerText = data.user.email;
                    document.getElementById('userAvatar').innerText = data.user.first_name.charAt(0);
                }
            })
            .catch(err => console.error('Error loading user:', err));
    }
    
    function loadSavedReports() {
        fetch('/api/user-history')
            .then(res => res.json())
            .then(data => {
                if (data.success && data.history && data.history.length > 0) {
                    displayReports(data.history);
                } else {
                    document.getElementById('reportsList').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-file-alt empty-icon"></i>
                            <h6>No reports yet</h6>
                            <p class="text-muted">Upload an MRI scan from the Detection page to generate reports</p>
                            <a href="/detection" class="btn-download" style="display: inline-block; margin-top: 1rem; text-decoration: none;">
                                <i class="fas fa-microscope"></i> Go to Detection
                            </a>
                        </div>
                    `;
                }
            })
            .catch(err => console.error('Error loading reports:', err));
    }
    
    function displayReports(history) {
        const reportsList = document.getElementById('reportsList');
        reportsList.innerHTML = history.map(item => {
            const displayName = (item.prediction || '').replace(/_/g, ' ').toUpperCase();
            let badgeClass = 'badge-no-tumor';
            if (item.prediction && item.prediction.includes('glioma')) badgeClass = 'badge-glioma';
            else if (item.prediction && item.prediction.includes('meningioma')) badgeClass = 'badge-meningioma';
            else if (item.prediction && item.prediction.includes('pituitary')) badgeClass = 'badge-pituitary';
            
            const date = new Date(item.created_at);
            const dateStr = date.toLocaleDateString();
            const timeStr = date.toLocaleTimeString();
            const confidence = ((item.confidence || 0) * 100).toFixed(1);
            
            return `
                <div class="report-item">
                    <div class="report-info">
                        <div class="report-title">
                            <span class="${badgeClass} report-badge">${displayName}</span>
                            <span class="ms-2">${confidence}% confidence</span>
                        </div>
                        <div class="report-meta">
                            <i class="fas fa-calendar-alt"></i> ${dateStr} at ${timeStr}
                            <i class="fas fa-microscope ms-3"></i> MobileNetV2
                        </div>
                    </div>
                    <button class="btn-download" onclick="downloadReport(${item.id})">
                        <i class="fas fa-download"></i> Download Report
                    </button>
                </div>
            `;
        }).join('');
    }
    
    async function downloadReport(analysisId) {
        const loader = document.getElementById('loaderOverlay');
        loader.style.display = 'flex';
        
        try {
            const response = await fetch(`/api/analysis/${analysisId}`);
            const data = await response.json();
            
            if (data.success && data.analysis) {
                const analysis = data.analysis;
                const reportHtml = generateClinicalReport(analysis);
                
                const blob = new Blob([reportHtml], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                a.download = `neuroscan_report_${analysisId}_${timestamp}.html`;
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(url);
                a.remove();
                
                showToast('Report downloaded successfully! Open in browser and press Ctrl+P to save as PDF', 'success');
            } else {
                showToast('Could not fetch report data', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('Error downloading report: ' + error.message, 'error');
        } finally {
            loader.style.display = 'none';
        }
    }
    
    function generateClinicalReport(analysis) {
        const prediction = analysis.prediction || 'unknown';
        const confidence = (analysis.confidence || 0) * 100;
        const displayName = prediction.replace(/_/g, ' ').toUpperCase();
        const isTumor = prediction !== 'no_tumor';
        const createdAt = analysis.created_at || new Date().toISOString();
        const date = new Date(createdAt).toLocaleString();
        const currentDate = new Date().toLocaleString();
        
        // Parse probabilities
        let probabilities = {};
        if (analysis.probabilities) {
            try {
                probabilities = typeof analysis.probabilities === 'string' ? 
                    JSON.parse(analysis.probabilities) : analysis.probabilities;
            } catch(e) {
                probabilities = {};
            }
        }
        
        // Generate probabilities table
        let probabilitiesHtml = '';
        if (Object.keys(probabilities).length > 0) {
            probabilitiesHtml = Object.entries(probabilities).map(([key, value]) => {
                const probPercent = (value * 100).toFixed(1);
                return `
                    <tr>
                        <td style="padding: 10px; border-bottom: 1px solid #ddd;">${key.replace(/_/g, ' ').toUpperCase()}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #ddd;">${probPercent}%</td>
                        <td style="padding: 10px; border-bottom: 1px solid #ddd;">
                            <div style="width: 100%; background: #e0e0e0; border-radius: 5px; overflow: hidden;">
                                <div style="width: ${probPercent}%; height: 25px; background: linear-gradient(90deg, #00E5FF, #7C5CBF);"></div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        } else {
            probabilitiesHtml = '<tr><td colspan="3" style="padding: 10px; text-align: center;">No probability data available</td></tr>';
        }
        
        return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroScan AI - Clinical Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.6;
            background: #f5f5f5;
        }
        .report-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .content {
            padding: 30px;
        }
        .diagnosis {
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        .diagnosis.tumor {
            background: #fff3e0;
            border-left: 5px solid #ff9800;
        }
        .diagnosis.no-tumor {
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
        }
        .diagnosis h2 {
            margin-bottom: 15px;
        }
        .confidence {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
        }
        .info-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        .info-table tr:last-child td {
            border-bottom: none;
        }
        .info-table td:first-child {
            font-weight: bold;
            width: 40%;
            background: #667eea20;
        }
        .prob-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .prob-table th {
            background: #764ba2;
            color: white;
            padding: 12px;
            text-align: left;
        }
        .recommendation {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .footer {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 12px;
        }
        @media print {
            body {
                padding: 0;
                background: white;
            }
            .btn-print {
                display: none;
            }
        }
        .btn-print {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px;
            font-size: 16px;
        }
        .btn-print:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="header">
            <h1>🧠 NeuroScan AI</h1>
            <p>Clinical Report - Brain Tumor Detection</p>
        </div>
        
        <div class="content">
            <div style="text-align: center; margin-bottom: 20px;">
                <p><strong>Report ID:</strong> NEURO-${analysis.id}</p>
                <p><strong>Generated:</strong> ${currentDate}</p>
                <p><strong>Analysis Date:</strong> ${date}</p>
            </div>
            
            <div class="diagnosis ${isTumor ? 'tumor' : 'no-tumor'}">
                <h2>${isTumor ? '⚠️ TUMOR DETECTED' : '✅ NO TUMOR DETECTED'}</h2>
                <div class="confidence">${displayName}</div>
                <div>Confidence: ${confidence.toFixed(1)}%</div>
                <p style="margin-top: 15px;">${isTumor ? 'Please consult a medical professional for proper diagnosis and treatment.' : 'The brain scan appears normal based on AI analysis.'}</p>
            </div>
            
            <h3>Analysis Details</h3>
            <table class="info-table">
                <tr><td>Model Architecture</td><td>MobileNetV2 with Grad-CAM</td></tr>
                <tr><td>Validation Accuracy</td><td>95.7%</td></tr>
                <tr><td>Analysis Time</td><td>&lt; 3 seconds</td></tr>
                <tr><td>Framework</td><td>PyTorch</td></tr>
            </table>
            
            <h3>Class-wise Probabilities</h3>
            <table class="prob-table">
                <thead>
                    <tr><th>Class</th><th>Probability</th><th>Distribution</th></tr>
                </thead>
                <tbody>${probabilitiesHtml}</tbody>
            </table>
            
            <div class="recommendation">
                <strong>📋 Clinical Recommendation:</strong><br>
                ${isTumor ? 
                    'Based on the AI analysis, a brain tumor has been detected. Immediate consultation with a neurologist is recommended for further evaluation, including additional imaging studies and biopsy if necessary.' : 
                    'No abnormalities were detected in this MRI scan. Regular monitoring and routine checkups are still recommended as per standard medical guidelines.'}
            </div>

        const toast = document.createElement('div');
        toast.className = `toast-message toast-${type}`;
