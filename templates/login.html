<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — NeuraScan AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cyan: #00E5FF;
      --bg: #020810;
      --bg2: #060d1a;
      --text: #e8f4f8;
      --muted: #607d8b;
      --border: rgba(0, 229, 255, 0.1);
      --red: #FF4560;
      --green: #00E396;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(0, 229, 255, 0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.022) 1px, transparent 1px);
      background-size: 70px 70px;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(90px);
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: rgba(0, 229, 255, 0.04);
      top: -150px;
      left: -100px;
    }

    .orb2 {
      width: 420px;
      height: 420px;
      background: rgba(124, 92, 191, 0.04);
      bottom: -80px;
      right: -80px;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .right-panel {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      position: relative;
      overflow: hidden;
      order: 2;
    }

    .rp-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--cyan);
      border-radius: 9px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      border: 1.5px solid var(--cyan);
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--cyan);
      border-radius: 50%;
    }

    .rp-logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
    }

    .rp-logo-text em {
      color: var(--cyan);
      font-style: normal;
    }

    .rp-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .rp-tag {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    .rp-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }

    .rp-title em {
      color: var(--cyan);
      font-style: normal;
    }

    .left-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      order: 1;
    }

    .form-card {
      width: 100%;
      max-width: 400px;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .form-sub {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2.2rem;
    }

    .form-sub a {
      color: var(--cyan);
      text-decoration: none;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.78rem 1.1rem;
      background: var(--bg2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 9px;
      color: var(--text);
      font-size: 0.92rem;
      outline: none;
    }

    .form-input:focus {
      border-color: rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.06);
    }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      border-radius: 9px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover {
      box-shadow: 0 0 28px rgba(0, 229, 255, 0.38);
      transform: translateY(-1px);
    }

    .error-msg {
      display: none;
      background: rgba(255, 69, 96, 0.08);
      border: 1px solid rgba(255, 69, 96, 0.3);
      border-radius: 7px;
      padding: 0.7rem 1rem;
      font-size: 0.83rem;
      color: var(--red);
      margin-bottom: 1.2rem;
    }

    .error-msg.show {
      display: block;
    }

    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .signup-link a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 600;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="grid-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="page">
    <div class="left-panel">
      <div class="form-card">
        <h1 class="form-title">Welcome back</h1>
        <p class="form-sub">Don't have an account? <a href="/signup">Sign up here</a></p>

        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="btn-submit" onclick="handleLogin()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h6v6M14 10L21 3M4 7h10M4 12h10M4 17h6" />
          </svg>
          Sign In
        </button>

        <div class="signup-link">New to NeuraScan? <a href="/signup">Create account →</a></div>
      </div>
    </div>

    <div class="right-panel">
      <a href="/" class="rp-logo">
        <div class="logo-mark"></div>
        <div class="rp-logo-text">Neura<em>Scan</em></div>
      </a>
      <div class="rp-center">
        <div class="rp-tag">AI-Powered Detection</div>
        <h2 class="rp-title">Brain Tumor<br>Analysis with<br><em>Grad-CAM</em></h2>
        <p class="rp-desc" style="font-size:0.9rem; color:var(--muted); line-height:1.6;">95.7% accuracy • MobileNetV2 •
          Real-time heatmaps</p>
      </div>
    </div>
  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errDiv = document.getElementById('errorMsg');

      errDiv.classList.remove('show');

      if (!email || !password) {
        errDiv.textContent = 'Please enter both email and password.';
        errDiv.classList.add('show');
        return;
      }

      const btn = document.querySelector('.btn-submit');
      btn.disabled = true;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="31.4 31.4" style="animation: spin 1s linear infinite"/></svg> Signing in...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        const data = await response.json();

        if (data.success) {
          // Store user info in session storage
          sessionStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard';
        } else {
          errDiv.textContent = data.message;
          errDiv.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M14 10L21 3M4 7h10M4 12h10M4 17h6"/></svg> Sign In';
        }
      } catch (error) {
        errDiv.textContent = 'Network error. Please try again.';
        errDiv.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M14 10L21 3M4 7h10M4 12h10M4 17h6"/></svg> Sign In';
      }
    }
  </script>
</body>

</html>
